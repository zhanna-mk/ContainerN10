document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ption>\n          <\u002Fselect>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:9px;\">\n          <label style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;\">Телефон / e-mail<\u002Flabel>\n          <input value=\"{{ contact }}\" onchange=\"{{ onContact }}\" placeholder=\"Для подтверждения\" style=\"background:rgba(4,5,12,.7);border:1px solid var(--line);color:#f3f5fb;padding:15px 16px;font-size:16px;outline:none;\" style-focus=\"border-color:var(--ikb);box-shadow:0 0 0 1px var(--ikb);\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:9px;\">\n        <label style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;\">Записка в капсулу 2036<\u002Flabel>\n        <textarea value=\"{{ note }}\" onchange=\"{{ onNote }}\" rows=\"3\" placeholder=\"Пожелание, прогноз или идея для компании на следующие 10 лет\" style=\"background:rgba(4,5,12,.7);border:1px solid var(--line);color:#f3f5fb;padding:15px 16px;font-size:16px;line-height:1.5;outline:none;resize:vertical;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;\" style-focus=\"border-color:var(--ikb);box-shadow:0 0 0 1px var(--ikb);\"><\u002Ftextarea>\n      <\u002Fdiv>\n      <sc-if value=\"{{ err }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.08em;color:#ff7a7a;\">⚠ {{ err }}<\u002Fdiv>\n      <\u002Fsc-if>\n      <button type=\"submit\" style=\"font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:.16em;text-transform:uppercase;color:#fff;border:1px solid var(--ikb);background:var(--ikb);padding:19px;cursor:pointer;margin-top:6px;\" style-hover=\"box-shadow:0 0 34px rgba(38,104,255,.6);\">Оформить декларацию →<\u002Fbutton>\n    <\u002Fform>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ submitted }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"border:1px solid var(--ikb);background:rgba(8,11,22,.7);padding:clamp(34px,5vw,60px);text-align:center;position:relative;box-shadow:0 0 60px rgba(38,104,255,.2) inset;\">\n      <div style=\"display:inline-block;border:2px solid var(--ikb);color:var(--ikb);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:700;font-size:34px;letter-spacing:.06em;padding:10px 26px;text-transform:uppercase;transform:rotate(-5deg);margin-bottom:30px;\">ВЫПУЩЕН · 10/10<\u002Fdiv>\n      <div style=\"font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:700;font-size:clamp(28px,4vw,46px);text-transform:uppercase;color:#f3f5fb;line-height:1;margin-bottom:8px;\">{{ name }}<\u002Fdiv>\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;margin-bottom:28px;\">{{ attendLabel }} · {{ guestsLabel }}<\u002Fdiv>\n      <div style=\"display:inline-flex;flex-direction:column;gap:6px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:18px 36px;margin-bottom:28px;\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.24em;color:var(--muted);\">ВАШ BIC-КОД КОНТЕЙНЕРА<\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-weight:700;font-size:30px;letter-spacing:.1em;color:var(--ikb);\">{{ code }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:15px;line-height:1.6;color:#c4c9da;max-width:440px;margin:0 auto 26px;\">Декларация оформлена. Координаты вечера и место рассадки придут вместе с вашим BIC-кодом. В пути с 2016 — встречаемся на N.10.<\u002Fdiv>\n      <button type=\"button\" onclick=\"{{ edit }}\" style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line);background:transparent;padding:13px 24px;cursor:pointer;\" style-hover=\"color:#fff;border-color:var(--ikb);\">Изменить декларацию<\u002Fbutton>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== DEPARTURE COUNTDOWN (FINAL) ===================== -->\n<section id=\"departure\" data-screen-label=\"Отсчёт до отправления\" style=\"position:relative;padding:150px 32px 96px;background:#04050a;border-top:1px solid var(--line);overflow:hidden;\">\n  <!-- bottom light bloom — doors opening -->\n  <div style=\"position:absolute;left:0;right:0;bottom:0;height:64%;background:radial-gradient(58% 100% at 50% 100%, rgba(38,104,255,.22), rgba(38,104,255,.05) 46%, transparent 74%);pointer-events:none;\"><\u002Fdiv>\n\n  <div style=\"position:relative;z-index:1;max-width:1120px;margin:0 auto;text-align:center;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.3em;color:var(--ikb);text-transform:uppercase;margin-bottom:30px;\">// отсчёт до отправления<\u002Fdiv>\n    <h2 style=\"font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:600;font-size:clamp(30px,4.6vw,64px);line-height:1.0;letter-spacing:-.02em;margin:0 0 8px;text-transform:uppercase;color:#f3f5fb;\">Двери N.10 <span style=\"color:var(--ikb);\">распахнутся<\u002Fspan> через<\u002Fh2>\n\n    <!-- countdown -->\n    <div data-r=\"cd-row\" style=\"display:flex;align-items:flex-start;justify-content:center;gap:clamp(8px,2.6vw,40px);margin:56px 0 40px;\">\n      <div style=\"display:flex;flex-direction:column;align-items:center;gap:16px;\">\n        <div ref=\"{{ finalD }}\" style=\"font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:600;font-size:clamp(54px,11vw,138px);line-height:.8;letter-spacing:-.04em;color:#f3f5fb;font-variant-numeric:tabular-nums;text-shadow:0 0 44px rgba(80,150,255,.4);\">52<\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.28em;color:#7f93c0;text-transform:uppercase;\">дней<\u002Fdiv>\n      <\u002Fdiv>\n      <div data-r=\"cd-colon\" style=\"font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:200;font-size:clamp(40px,8vw,104px);line-height:.8;color:var(--ikb);opacity:.55;animation:blink 1.4s ease-in-out infinite;\">:<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;align-items:center;gap:16px;\">\n        <div ref=\"{{ finalH }}\" style=\"font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:600;font-size:clamp(54px,11vw,138px);line-height:.8;letter-spacing:-.04em;color:#f3f5fb;font-variant-numeric:tabular-nums;text-shadow:0 0 44px rgba(80,150,255,.4);\">03<\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.28em;color:#7f93c0;text-transform:uppercase;\">часов<\u002Fdiv>\n      <\u002Fdiv>\n      <div data-r=\"cd-colon\" style=\"font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:200;font-size:clamp(40px,8vw,104px);line-height:.8;color:var(--ikb);opacity:.55;animation:blink 1.4s ease-in-out infinite;\">:<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;align-items:center;gap:16px;\">\n        <div ref=\"{{ finalM }}\" style=\"font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:600;font-size:clamp(54px,11vw,138px);line-height:.8;letter-spacing:-.04em;color:#f3f5fb;font-variant-numeric:tabular-nums;text-shadow:0 0 44px rgba(80,150,255,.4);\">40<\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.28em;color:#7f93c0;text-transform:uppercase;\">минут<\u002Fdiv>\n      <\u002Fdiv>\n      <div data-r=\"cd-colon\" style=\"font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:200;font-size:clamp(40px,8vw,104px);line-height:.8;color:var(--ikb);opacity:.55;animation:blink 1.4s ease-in-out infinite;\">:<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;align-items:center;gap:16px;\">\n        <div ref=\"{{ finalS }}\" style=\"font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:600;font-size:clamp(54px,11vw,138px);line-height:.8;letter-spacing:-.04em;color:var(--ikb);font-variant-numeric:tabular-nums;text-shadow:0 0 44px rgba(80,150,255,.5);\">25<\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.28em;color:#7f93c0;text-transform:uppercase;\">секунд<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:inline-flex;align-items:center;gap:14px;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.2em;color:#c8d4ee;text-transform:uppercase;padding:12px 22px;border:1px solid var(--line);background:rgba(8,11,22,.5);\">\n      <span style=\"width:6px;height:6px;background:var(--ikb);border-radius:50%;box-shadow:0 0 9px var(--ikb);animation:blink 1.4s ease-in-out infinite;\"><\u002Fspan>\n      23.08.2026 · 17:00 · посадка · Hyatt Regency Yekaterinburg\n    <\u002Fdiv>\n\n    <p style=\"max-width:46ch;margin:44px auto 0;font-size:clamp(15px,1.4vw,18px);line-height:1.7;color:#9aa0b6;\">Десять лет в пути. Один контейнер. Что внутри — узнаете, когда откроются двери.<\u002Fp>\n\n    <a href=\"#rsvp\" style=\"display:inline-block;margin-top:40px;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:#fff;border:1px solid var(--ikb);background:var(--ikb);padding:18px 34px;\" style-hover=\"box-shadow:0 0 34px rgba(38,104,255,.6);\">Занять место на борту →<\u002Fa>\n  <\u002Fdiv>\n\n  <div style=\"position:relative;z-index:1;max-width:1120px;margin:110px auto 0;padding-top:30px;border-top:1px solid var(--line);display:flex;flex-wrap:wrap;justify-content:space-between;align-items:flex-end;gap:24px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;\">\n    <div style=\"display:flex;flex-direction:column;gap:9px;\">\n      <span style=\"color:var(--ikb);\">CONTAINER N.10<\u002Fspan>\n      <span>TRANSATLANTIC · 2016 — 2026<\u002Fspan>\n    <\u002Fdiv>\n    <img src=\"bbab9e9d-16ca-4980-a1af-d3c57e795b6d\" alt=\"TRANSATLANTIC\" style=\"height:30px;width:auto;opacity:.8;\">\n  <\u002Fdiv>\n<\u002Fsection>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900},&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#2668ff&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Тема&quot;},&quot;reduceMotion&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Тема&quot;}}\">\nclass Component extends DCLogic {\n  state = { name:'', company:'', attend:'', guests:'0', note:'', contact:'', submitted:false, code:'', err:'', open:false };\n  // ↓↓↓ Paste your Google Apps Script Web App URL (or form-service endpoint) between the quotes ↓↓↓\n  RSVP_ENDPOINT = '';\n  cdRefs = { d:React.createRef(), h:React.createRef(), m:React.createRef(), s:React.createRef() };\n  finalRefs = { d:React.createRef(), h:React.createRef(), m:React.createRef(), s:React.createRef() };\n  stageRef = React.createRef();\n  fxRef = React.createRef();\n  latRef = React.createRef();\n  lonRef = React.createRef();\n  hdgRef = React.createRef();\n  altRef = React.createRef();\n  leftDoorRef = React.createRef();\n  rightDoorRef = React.createRef();\n  heroContentRef = React.createRef();\n  manifestRef = React.createRef();\n  cLabel = React.createRef();\n  cHead = React.createRef();\n  cSub = React.createRef();\n  cFig = React.createRef();\n  _scrollShown = new Set();\n  _doorsOpen = false;\n  _revealTimers = [];\n  _shownEls = [];\n\n  prefersReduced(){\n    return this.props.reduceMotion || (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);\n  }\n\n  componentDidMount(){\n    try { const s = JS щие десять лет уже в пути.', cargo:'10 лет курса', status:'в пути' },\n    ];\n\n    return {\n      name, company, attend, guests, note, contact, submitted, code, err,\n      notSubmitted: !submitted,\n      attendOptions, attendLabel, guestsLabel, countdownUnits, containerCards, manifest: this.manifest,\n      finalD: this.finalRefs.d, finalH: this.finalRefs.h, finalM: this.finalRefs.m, finalS: this.finalRefs.s,\n      stageRef: this.stageRef, fxRef: this.fxRef,\n      leftDoorRef: this.leftDoorRef, rightDoorRef: this.rightDoorRef,\n      heroContentRef: this.heroContentRef, manifestRef: this.manifestRef,\n      cLabel: this.cLabel, cHead: this.cHead, cSub: this.cSub, cFig: this.cFig,\n      latRef: this.latRef, lonRef: this.lonRef, hdgRef: this.hdgRef, altRef: this.altRef,\n      onName: this.set('name'), onCompany: this.set('company'), onGuests: this.set('guests'),\n      onNote: this.set('note'), onContact: this.set('contact'),\n      submit: this.submit, edit: this.edit\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
